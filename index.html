<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Fatima 💌</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#ffdde1,#ee9ca7);
  font-family:Arial;
  overflow:hidden;
}

/* floating hearts */
.bgHeart{
  position:fixed;
  bottom:-20px;
  animation:float 8s linear infinite;
  opacity:.7;
}
@keyframes float{
  0%{transform:translateY(0);opacity:0}
  50%{opacity:1}
  100%{transform:translateY(-120vh);opacity:0}
}

.container{ cursor:pointer; transition:.6s; }
.container.open{ transform:scale(1.2); }

/* ENVELOPE */
.envelope{
  width:270px;
  height:190px;
  background:#ff4d6d;
  border-radius:15px;
  position:relative;
  box-shadow:0 25px 60px rgba(0,0,0,.3);
  overflow:hidden; /* ⭐ IMPORTANT FIX */
}

/* flap */
.flap{
  position:absolute;
  width:100%;
  height:100%;
  background:#ff758f;
  clip-path:polygon(0 0,100% 0,50% 60%);
  transform-origin:top;
  transition:1s;
  z-index:3;
}

/* LETTER hidden inside envelope */
.letter{
  position:absolute;
  width:92%;
  height:92%;
  background:white;
  left:4%;
  top:120%; /* ⭐ start hidden BELOW envelope */
  border-radius:12px;
  padding:18px;
  box-sizing:border-box;
  transition:1s;
  box-shadow:0 15px 30px rgba(0,0,0,.25);
  overflow:auto;
}

/* OPEN animation */
.container.open .flap{ transform:rotateX(180deg); }
.container.open .letter{ top:4%; } /* ⭐ slide OUT */

.text{
  text-align:center;
  line-height:1.6;
  font-size:15px;
}
</style>
</head>

<body>

<audio id="bgmusic" loop>
   <source src="music.mp3">
</audio>

<div class="container" onclick="openLetter()">
  <div class="envelope">
    <div class="flap"></div>

    <div class="letter">
      <p class="text">
      To Fatima 💌<br><br>
      As Mirza Ghalib would say,<br>
      “husn ko naqaab ki zarurat nahi hoti.”<br><br>
      Honestly, you make courage look cute.<br>
      Somehow you turned strength into charm.<br><br>
      I started noticing you… and now I’m low-key glad I did.<br><br>
      Careful, I might start liking you a little more ❤️
      </p>
    </div>
  </div>
</div>

<script>
function openLetter(){
 document.querySelector(".container").classList.toggle("open");
 document.getElementById("bgmusic").play();

 for(let i=0;i<50;i++){
   let h=document.createElement("div");
   h.innerHTML="💖";
   h.style.position="fixed";
   h.style.left="50vw";
   h.style.bottom="40vh";
   h.style.fontSize=(20+Math.random()*30)+"px";
   h.style.transition="2s";
   document.body.appendChild(h);
   setTimeout(()=>{
     h.style.left=Math.random()*100+"vw";
     h.style.bottom="120vh";
     h.style.opacity=0;
   },50);
   setTimeout(()=>h.remove(),2000);
 }
}

setInterval(()=>{
 let h=document.createElement("div");
 h.className="bgHeart";
 h.innerHTML="💗";
 h.style.left=Math.random()*100+"vw";
 h.style.fontSize=(15+Math.random()*20)+"px";
 document.body.appendChild(h);
 setTimeout(()=>h.remove(),8000);
},600);
</script>

</body>
